<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclical Disease Activity Prototype</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #deefe7;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="radialChart" width="600" height="600"></canvas>

<script>
    const canvas = document.getElementById('radialChart');
    const ctx = canvas.getContext('2d');
    
    const width = canvas.width;
    const height = canvas.height;
    const centerX = width / 2;
    const centerY = height / 2;
    
    // Chart configurations
    const minRadius = 40;  // Baseline (Center)
    const maxRadius = 260; // Max Flare (Outer edge)
    const historyLength = 600; // Trail lasts 3 times as long
    
    // Animation state
    let angle = 0;
    const angleStep = 0.04; // Line goes twice as fast
    let currentRadius = minRadius;
    let targetRadius = minRadius;
    let pathHistory = [];

    // Draw the background structural rings
    function drawBackground() {
        ctx.clearRect(0, 0, width, height);
        
        const zones = [
            { r: 260, label: 'Severe Flare' },
            { r: 180, label: 'Moderate' },
            { r: 100, label: 'Mild' },
            { r: 40,  label: 'Baseline' }
        ];

        zones.forEach(zone => {
            ctx.beginPath();
            ctx.arc(centerX, centerY, zone.r, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff'; 
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Subtle white labels to match the lines
            ctx.fillStyle = '#ffffff'; 
            ctx.font = '12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(zone.label, centerX, centerY - zone.r + 15);
        });
    }

    // Determine the color based on how far out the line is (severity)
    function getColorForRadius(r) {
        // Normalize radius between 0 and 1
        const normalized = (r - minRadius) / (maxRadius - minRadius);
        // Map to Hue: 120 (Green) to 0 (Red)
        const hue = (1 - normalized) * 120; 
        return `hsl(${hue}, 90%, 50%)`;
    }

    // Main animation loop
    function animate() {
        drawBackground();

        // 1. Randomly decide to shift towards a flare or recovery
        if (Math.random() < 0.02) { 
            // 30% chance to target baseline, 70% chance to target a random flare severity
            if (Math.random() < 0.3) {
                targetRadius = minRadius + (Math.random() * 20); 
            } else {
                targetRadius = minRadius + 50 + (Math.random() * (maxRadius - minRadius - 50));
            }
        }

        // 2. Smoothly ease the current radius toward the target radius
        currentRadius += (targetRadius - currentRadius) * 0.05;

        // 3. Calculate X and Y using polar to Cartesian conversion
        const x = centerX + currentRadius * Math.cos(angle);
        const y = centerY + currentRadius * Math.sin(angle);

        // 4. Store in history
        pathHistory.push({ x, y, r: currentRadius });
        if (pathHistory.length > historyLength) {
            pathHistory.shift(); // Remove oldest point to create a trail effect
        }

        // 5. Draw the path with a gradient based on severity
        for (let i = 1; i < pathHistory.length; i++) {
            const p1 = pathHistory[i - 1];
            const p2 = pathHistory[i];
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            
            // Fade out the tail end of the line
            const opacity = i / pathHistory.length;
            
            // Color based on severity (radius)
            ctx.strokeStyle = getColorForRadius(p2.r);
            ctx.globalAlpha = opacity;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
        
        ctx.globalAlpha = 1.0; // Reset alpha

        // 6. Draw the leading "head" point
        if (pathHistory.length > 0) {
            const head = pathHistory[pathHistory.length - 1];
            ctx.beginPath();
            ctx.arc(head.x, head.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = getColorForRadius(head.r);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Increment angle to sweep around the circle
        angle += angleStep;

        // Loop the animation
        requestAnimationFrame(animate);
    }

    // Start the animation
    animate();
</script>

</body>
</html>
