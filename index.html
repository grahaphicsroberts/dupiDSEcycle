<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Continuously Drawing Linear Chart with Gradient Fill</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: white; /* Changed */
            font-family: sans-serif;
        }
        canvas {
            display: block;
            /* Removed background-color to inherit from body */
        }
    </style>
</head>
<body>

<canvas id="linearChart" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById('linearChart');
    const ctx = canvas.getContext('2d');
    
    const width = canvas.width;
    const height = canvas.height;
    
    // --- Chart Configurations ---
    const padding = { top: 40, right: 60, bottom: 60, left: 60 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;
    
    // Y-Axis values
    const minValue = 0;
    const maxValue = 240; 

    // Animation Configurations
    const scrollSpeed = 40; // pixels per second

    // --- State ---
    let pathHistory = [];
    let lastTime = 0; 
    
    // --- Organic State Machine for Data Simulation ---
    let isFlaring = false;
    let timeInCurrentState = 0;
    let totalTimeForState = 0;
    let peakValue = minValue; 

    // --- Helper Functions ---
    
    function mapValueToY(value) {
        const range = maxValue - minValue;
        return padding.top + chartHeight - ((value - minValue) / range) * chartHeight;
    }

    function drawAxisAndLabels() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#5c7a68';
        ctx.strokeStyle = '#5c7a68';
        ctx.lineWidth = 1;
        ctx.font = '500 14px sans-serif';

        // Y-Axis Line
        ctx.beginPath();
        ctx.moveTo(padding.left, padding.top);
        ctx.lineTo(padding.left, height - padding.bottom);
        ctx.stroke();

        // X-Axis Line
        ctx.beginPath();
        ctx.moveTo(padding.left, height - padding.bottom);
        ctx.lineTo(width - padding.right, height - padding.bottom);
        ctx.stroke();

        // Y-Axis Label
        ctx.save();
        // Adjusted translation for spacing
        ctx.translate(padding.left - 35, height / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText('Disease Activity', 0, 0);
        ctx.restore();

        // X-Axis Label
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        // Adjusted y-position for spacing
        ctx.fillText('Time', width / 2, height - padding.bottom + 20);
    }

    // --- Main Animation Loop ---
    function animate(timestamp) {
        if (!lastTime) lastTime = timestamp;
        
        const deltaTime = (timestamp - lastTime) / 1000; // in seconds
        lastTime = timestamp;

        // --- 1. UPDATE DATA (Organic State Machine) ---
        timeInCurrentState += deltaTime * 1000;

        if (timeInCurrentState >= totalTimeForState) {
            isFlaring = !isFlaring;
            timeInCurrentState = 0;
            
            if (isFlaring) {
                totalTimeForState = 1000 + (Math.random() * 3000); 
                peakValue = 60 + (Math.random() * (maxValue - 60));
            } else {
                totalTimeForState = 2000 + (Math.random() * 5000); 
            }
        }
        
        let currentValue;
        let progress = timeInCurrentState / totalTimeForState;
        
        if (isFlaring) {
            let ease = Math.sin(progress * Math.PI);
            currentValue = minValue + (peakValue - minValue) * ease;
        } else {
            let gentleWobble = Math.sin(progress * Math.PI * 4) * 5;
            currentValue = minValue + 20 + gentleWobble;
        }
        currentValue = Math.max(minValue, currentValue);

        // --- 2. UPDATE PATH HISTORY ---
        const drawingHeadX = width - padding.right;
        
        const shiftAmount = scrollSpeed * deltaTime;
        for (const point of pathHistory) {
            point.x -= shiftAmount;
        }

        const newY = mapValueToY(currentValue);
        pathHistory.push({ x: drawingHeadX, y: newY, value: currentValue });
        
        pathHistory = pathHistory.filter(p => p.x > padding.left - 5);
        
        // --- 3. DRAW EVERYTHING ---
        drawAxisAndLabels();
        
        if (pathHistory.length > 1) {
            // Create the gradient for the fill
            const fillGradient = ctx.createLinearGradient(0, height - padding.bottom, 0, padding.top);
            fillGradient.addColorStop(0, 'rgba(255, 255, 0, 0.5)'); // Yellow at the bottom
            fillGradient.addColorStop(0.75, 'rgba(255, 0, 0, 0.5)'); // Red towards the top
            fillGradient.addColorStop(1, 'rgba(255, 0, 0, 0.6)');   // Darker Red at the very top

            // Create the filled path under the curve
            ctx.beginPath();
            ctx.moveTo(pathHistory[0].x, height - padding.bottom); // Start at bottom-left of path
            ctx.lineTo(pathHistory[0].x, pathHistory[0].y); // Move to the first data point

            for (let i = 1; i < pathHistory.length; i++) {
                ctx.lineTo(pathHistory[i].x, pathHistory[i].y);
            }

            ctx.lineTo(pathHistory[pathHistory.length - 1].x, height - padding.bottom); // Line to bottom-right
            ctx.closePath();
            
            ctx.fillStyle = fillGradient;
            ctx.fill();
        }

        // Draw the leading "head" circle
        const head = pathHistory[pathHistory.length - 1];
        if (head) {
            ctx.beginPath();
            ctx.arc(head.x, head.y, 6, 0, Math.PI * 2);
            // Color the head based on value (Yellow to Red)
            const normalized = Math.max(0, Math.min(1, (head.value - minValue) / (maxValue - minValue)));
            const hue = (1 - normalized) * 60; 
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.fill();
            ctx.strokeStyle = '#333333'; // Darker stroke for better visibility on white
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
</script>

</body>
</html>
