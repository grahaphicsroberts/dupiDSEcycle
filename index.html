<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclical Disease Activity: 2x Speed Time-Locked View</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #DAF0E7;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="radialChart" width="650" height="650"></canvas>

<script>
    const canvas = document.getElementById('radialChart');
    const ctx = canvas.getContext('2d');
    
    const width = canvas.width;
    const height = canvas.height;
    const centerX = width / 2;
    const centerY = height / 2;
    
    // Chart configurations
    const minRadius = 40;  
    const maxRadius = 240; 
    
    // Time-based configurations (Doubled Speed)
    const radiansPerSecond = 0.90; 
    const trailDurationMs = 7000;  
    
    // State 
    let angle = -Math.PI / 2; 
    let currentRadius = minRadius;
    let pathHistory = [];
    let lastTime = 0; 

    // Organic State Machine
    let isFlaring = false;
    let timeInCurrentState = 0;
    let totalTimeForState = 0;
    let peakRadius = minRadius;
    
    const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    function drawBackground() {
        ctx.clearRect(0, 0, width, height);
        
        const zones = [
            { r: 240, label: 'Severe Flare' },
            { r: 170, label: 'Moderate' },
            { r: 100, label: 'Mild' },
            { r: 40,  label: 'Baseline' }
        ];

        // Draw structural rings
        zones.forEach(zone => {
            ctx.beginPath();
            ctx.arc(centerX, centerY, zone.r, 0, Math.PI * 2);
            // Changed to #5c7a68 (label color) at 40% opacity
            ctx.strokeStyle = 'rgba(92, 122, 104, 0.4)'; 
            ctx.lineWidth = 1;
            ctx.stroke();
            
            ctx.fillStyle = '#5c7a68'; 
            ctx.font = '500 12px sans-serif'; 
            ctx.textAlign = 'center';
            ctx.fillText(zone.label, centerX, centerY - zone.r + 15);
        });

        // Draw Month Calendar Labels around the perimeter
        ctx.fillStyle = '#7a9e8c'; 
        ctx.font = 'bold 14px sans-serif';
        ctx.textBaseline = 'middle';
        
        for (let i = 0; i < 12; i++) {
            const monthAngle = (i / 12) * Math.PI * 2 - Math.PI / 2;
            const labelRadius = maxRadius + 25;
            const x = centerX + labelRadius * Math.cos(monthAngle);
            const y = centerY + labelRadius * Math.sin(monthAngle);
            
            ctx.fillText(months[i], x, y);

            // Add small tick marks for the months, matching the ring color and opacity
            const tickStartX = centerX + maxRadius * Math.cos(monthAngle);
            const tickStartY = centerY + maxRadius * Math.sin(monthAngle);
            const tickEndX = centerX + (maxRadius + 10) * Math.cos(monthAngle);
            const tickEndY = centerY + (maxRadius + 10) * Math.sin(monthAngle);

            ctx.beginPath();
            ctx.moveTo(tickStartX, tickStartY);
            ctx.lineTo(tickEndX, tickEndY);
            ctx.strokeStyle = 'rgba(92, 122, 104, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    function getColorForRadius(r) {
        const normalized = Math.max(0, Math.min(1, (r - minRadius) / (maxRadius - minRadius)));
        const hue = (1 - normalized) * 60; 
        return `hsl(${hue}, 100%, 50%)`;
    }

    function animate(timestamp) {
        if (!lastTime) lastTime = timestamp;
        
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        drawBackground();

        // --- UPDATE LOGIC ---
        timeInCurrentState += deltaTime;

        if (timeInCurrentState >= totalTimeForState) {
            isFlaring = !isFlaring;
            timeInCurrentState = 0;
            
            if (isFlaring) {
                totalTimeForState = 250 + (Math.random() * 800);
                peakRadius = minRadius + 60 + (Math.random() * (maxRadius - minRadius - 60));
            } else {
                totalTimeForState = 500 + (Math.random() * 1650);
            }
        }
        
        let progress = timeInCurrentState / totalTimeForState;
        
        if (isFlaring) {
            let ease = Math.sin(progress * Math.PI);
            currentRadius = minRadius + (peakRadius - minRadius) * ease;
        } else {
            let gentleWobble = Math.sin(progress * Math.PI * 4);
            currentRadius = minRadius + (5 * gentleWobble);
        }

        // --- MOVEMENT & HISTORY ---
        angle += radiansPerSecond * (deltaTime / 1000);

        const x = centerX + currentRadius * Math.cos(angle);
        const y = centerY + currentRadius * Math.sin(angle);

        pathHistory.push({ x, y, r: currentRadius, time: timestamp });
        
        while (pathHistory.length > 0 && timestamp - pathHistory[0].time > trailDurationMs) {
            pathHistory.shift(); 
        }

        // --- DRAWING ---
        for (let i = 1; i < pathHistory.length; i++) {
            const p1 = pathHistory[i - 1];
            const p2 = pathHistory[i];
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            
            const ageMs = timestamp - p2.time;
            const opacity = Math.max(0, 1.0 - (ageMs / trailDurationMs));
            
            ctx.strokeStyle = getColorForRadius(p2.r);
            ctx.globalAlpha = opacity;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
        
        ctx.globalAlpha = 1.0; 

        // Draw the leading head
        if (pathHistory.length > 0) {
            const head = pathHistory[pathHistory.length - 1];
            ctx.beginPath();
            ctx.arc(head.x, head.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = getColorForRadius(head.r);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
</script>

</body>
</html>
